name: Build Image

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest   # use GitHub runner (no self-hosted)

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t sujithss290/hello-nginx:latest .

      - name: Push Docker Image
        run: |
          docker push sujithss290/hello-nginx:latest